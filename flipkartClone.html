<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Clone</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f1f3f6;
}

/* Navbar */
.navbar{
    background:#2874f0;
    padding:10px 20px;
    display:flex;
    gap:10px;
    align-items:center;
    color:white;
}
.navbar input{
    flex:1;
    padding:8px;
    border:none;
    border-radius:4px;
}
.navbar button{
    padding:8px 12px;
    border:none;
    background:white;
    color:#2874f0;
    font-weight:bold;
    cursor:pointer;
    border-radius:4px;
}

/* Categories */
.categories{
    display:flex;
    justify-content:space-around;
    background:white;
    padding:15px;
    font-weight:bold;
}

/* Products */
.products{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
    justify-content:center;
}
.card{
    background:white;
    width:200px;
    padding:15px;
    border-radius:6px;
    text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    cursor:pointer;
}
.card img{
    width:120px;
    height:120px;
    object-fit:contain;
}
.card button{
    margin-top:8px;
    width:100%;
    padding:8px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

/* Modal Common */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}
.modal-box{
    background:white;
    padding:20px;
    width:300px;
    border-radius:8px;
    text-align:center;
}
.modal-box img{
    width:150px;
}

/* Responsive */
@media(max-width:768px){
    .navbar{flex-direction:column;}
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <img src="Flipkart-Emblema.png" height="30">
    <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
    <button onclick="openCart()">Cart (<span id="cartCount">0</span>)</button>
</div>

<!-- Categories -->
<div class="categories">
    <div onclick="filterCategory('Mobiles')">Mobiles</div>
    <div onclick="filterCategory('Fashion')">Fashion</div>
    <div onclick="filterCategory('Electronics')">Electronics</div>
    <div onclick="filterCategory('Home')">Home</div>
</div>


<!-- Products -->
<div class="products" id="productBox"></div>

<!-- Product Details Modal -->
<div class="modal" id="productModal">
    <div class="modal-box">
        <img id="pImg">
        <h3 id="pName"></h3>
        <p id="pPrice"></p>
        <p id="pDesc"></p>
        <button onclick="closeProduct()">Close</button>
    </div>
</div>

<!-- Cart Modal -->
<div class="modal" id="cartModal">
    <div class="modal-box">
        <h3>Your Cart</h3>
        <div id="cartItems"></div>
        <button onclick="closeCart()">Close</button>
    </div>
</div>

<script>
    let cart = [];

let products = [
  {name:"Smartphone",price:"₹12,999",img:"apple phone.jpg",desc:"Latest smartphone with powerful features",category:"Mobiles"},
  {name:"Headphones",price:"₹1,999",img:"headphones.jpg",desc:"Wireless headphones with deep bass",category:"Electronics"},
  {name:"Laptop",price:"₹45,999",img:"laptop.jpg",desc:"High performance laptop for work & coding",category:"Electronics"},
  {name:"Smartwatch",price:"₹2,999",img:"smartwatch.jpg",desc:"Fitness tracking smartwatch",category:"Fashion"},

  /* ✅ HOME PRODUCTS */
  {name:"Sofa",price:"₹9,999",img:"sofa.jpg",desc:"Comfortable sofa for living room",category:"Home"},
  {name:"Dining Table",price:"₹14,999",img:"dining.jpg",desc:"6-seater wooden dining table",category:"Home"},
  {name:"Lamp",price:"₹1,299",img:"lamp.jpg",desc:"Decorative table lamp for home",category:"Home"}
];


function displayProducts(list){
    let box = document.getElementById("productBox");
    box.innerHTML="";
    list.forEach((p,i)=>{
        box.innerHTML+=`
        <div class="card" onclick="openProduct(${i})">
            <img src="${p.img}">
            <h4>${p.name}</h4>
            <p>${p.price}</p>
            <button onclick="addCart(event,${i})">Add to Cart</button>
        </div>`;
    });
}

displayProducts(products);

/* Product Details */
function openProduct(i){
    document.getElementById("pImg").src=products[i].img;
    document.getElementById("pName").innerText=products[i].name;
    document.getElementById("pPrice").innerText=products[i].price;
    document.getElementById("pDesc").innerText=products[i].desc;
    document.getElementById("productModal").style.display="flex";
}
function closeProduct(){
    document.getElementById("productModal").style.display="none";
}

/* Cart */
function addCart(e,i){
    e.stopPropagation();
    cart.push(products[i]);
    document.getElementById("cartCount").innerText=cart.length;
}
function openCart(){
    let cartBox=document.getElementById("cartItems");
    cartBox.innerHTML="";
    cart.forEach(p=>{
        cartBox.innerHTML+=`<p>${p.name} - ${p.price}</p>`;
    });
    document.getElementById("cartModal").style.display="flex";
}
function closeCart(){
    document.getElementById("cartModal").style.display="none";
}

/* Search */
function searchProduct(){
    let value=document.getElementById("search").value.toLowerCase();
    let filtered=products.filter(p=>p.name.toLowerCase().includes(value));
    displayProducts(filtered);
}

function filterCategory(cat){
    let filtered = products.filter(p => p.category === cat);
    displayProducts(filtered);
}

</script>

</body>
</html>
